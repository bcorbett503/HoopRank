# Heap and encoding
org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8

# AndroidX/Jetifier
android.useAndroidX=true
android.enableJetifier=true

# AGP 8.9 lists API 35 as its tested ceiling; 36 works (required by
# mobile_scanner 7.x) but warns on every build without this.
android.suppressUnsupportedCompileSdk=36
